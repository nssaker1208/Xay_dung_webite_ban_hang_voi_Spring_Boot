<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <title>Website Bán Hàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav
      class="navbar bg-dark border-bottom border-body navbar-expand-lg"
      data-bs-theme="dark"
    >
      <div class="container-fluid px-4">
        <div class="d-flex align-items-center">
          <a class="navbar-brand text-light me-4" th:href="@{/products}"
            >Trang chủ</a
          >
          <a class="nav-link text-light me-3" th:href="@{/products/add}"
            >Quản lý sản phẩm</a
          >
          <a class="nav-link text-warning fw-bold me-3" th:href="@{/cart}"
            >🛒 Giỏ hàng</a
          >
        </div>

        <div class="d-flex align-items-center ms-auto">
          <form
            class="d-flex me-4"
            th:action="@{/products/search}"
            method="get"
          >
            <input
              class="form-control me-2"
              type="search"
              placeholder="Nhập tên sản phẩm..."
              name="key"
              th:value="${key}"
            />
            <button class="btn btn-outline-success" type="submit">
              Tìm kiếm
            </button>
          </form>

          <div
            th:if="${session.loggedInUser != null}"
            class="d-flex align-items-center border-start ps-3"
          >
            <span class="text-light me-3">
              Xin chào,
              <span
                class="text-info fw-bold"
                th:text="${session.loggedInUser.username}"
              ></span
              >!
            </span>
            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm"
              >Đăng xuất</a
            >
          </div>

          <div
            th:unless="${session.loggedInUser != null}"
            class="d-flex align-items-center border-start ps-3"
          >
            <a th:href="@{/login}" class="btn btn-outline-light btn-sm me-2"
              >Đăng nhập</a
            >
            <a th:href="@{/register}" class="btn btn-primary btn-sm">Đăng ký</a>
          </div>
        </div>
      </div>
    </nav>

    <div layout:fragment="content" class="container mt-4"></div>
  </body>
</html>
