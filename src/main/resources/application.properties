# Cấu hình cổng chạy server (mặc định là 8080)
server.port=8080

# Cấu hình kết nối MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/QLSP?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Để Hibernate tự động tạo bảng từ Entity (rất quan trọng cho Order và OrderDetail)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true