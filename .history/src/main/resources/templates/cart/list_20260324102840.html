<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <title>Giỏ hàng của bạn</title>
  </head>
  <body>
    <div layout:fragment="content" class="container mt-5 mb-5">
      <h2 class="mb-4 text-primary">Giỏ hàng của bạn</h2>

      <div
        th:if="${#lists.isEmpty(cartItems)}"
        class="alert alert-warning text-center p-5 shadow-sm"
      >
        <h4 class="text-muted">Giỏ hàng của bạn đang trống!</h4>
        <a th:href="@{/products}" class="btn btn-primary mt-3"
          >Quay lại trang sản phẩm</a
        >
      </div>

      <div th:if="${not #lists.isEmpty(cartItems)}" class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover table-bordered align-middle mb-0">
            <thead class="table-dark text-center">
              <tr>
                <th>Tên sản phẩm</th>
                <th>Hình ảnh</th>
                <th>Giá</th>
                <th style="width: 200px">Số lượng</th>
                <th>Thành tiền</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody class="text-center">
              <tr th:each="item: ${cartItems}">
                <td class="text-start fw-bold" th:text="${item.name}"></td>

                <td>
                  <img
                    th:src="${item.image}"
                    class="img-thumbnail"
                    style="width: 80px; height: auto"
                    alt="Sản phẩm"
                  />
                </td>

                <td
                  class="text-danger fw-semibold"
                  th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                ></td>

                <td>
                  <form
                    th:action="@{/cart/update}"
                    method="post"
                    class="d-flex justify-content-center"
                  >
                    <input
                      type="hidden"
                      name="productId"
                      th:value="${item.id}"
                    />
                    <div
                      class="input-group input-group-sm"
                      style="max-width: 150px"
                    >
                      <input
                        type="number"
                        name="quantity"
                        class="form-control text-center"
                        th:value="${item.quantity}"
                        min="1"
                      />
                      <button class="btn btn-outline-primary" type="submit">
                        Cập nhật
                      </button>
                    </div>
                  </form>
                </td>

                <td
                  class="text-danger fw-bold"
                  th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                ></td>

                <td>
                  <a
                    th:href="@{/cart/remove/{id}(id=${item.id})}"
                    class="btn btn-danger btn-sm"
                    >Xóa</a
                  >
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          class="card-footer d-flex justify-content-between align-items-center bg-light p-3"
        >
          <a th:href="@{/cart/clear}" class="btn btn-outline-danger btn-sm"
            >Xóa toàn bộ giỏ hàng</a
          >

          <div class="d-flex align-items-center gap-4">
            <h4 class="mb-0">
              Tổng tiền:
              <span
                class="text-danger fw-bold"
                th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' đ'"
              ></span>
            </h4>
            <form th:action="@{/cart/order}" method="post" class="m-0">
              <button type="submit" class="btn btn-success btn-lg px-5">
                ĐẶT HÀNG
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
