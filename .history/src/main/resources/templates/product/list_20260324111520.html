<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <title>Product List</title>
  </head>
  <body>
    <div layout:fragment="content" class="container body-content">
      
      <div th:if="${param.error != null}" class="alert alert-danger mt-3">
          ❌ Bạn không có quyền quản trị để thực hiện thao tác này!
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3 mt-4">
        
        <div th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
            <a th:href="@{/products/add}" class="btn btn-primary">Create New Product</a>
        </div>
        <div th:unless="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}"></div>

        <form th:action="@{/products}" method="get" class="d-flex gap-2">
          <select name="categoryId" class="form-select" style="width: auto">
            <option value="">-- Tất cả danh mục --</option>
            <option
              th:each="cat : ${categories}"
              th:value="${cat.id}"
              th:text="${cat.name}"
              th:selected="${cat.id == currentCategory}"
            ></option>
          </select>

          <select name="sort" class="form-select" style="width: auto">
            <option value="">-- Sắp xếp mặc định --</option>
            <option value="asc" th:selected="${currentSort == 'asc'}">
              Giá tăng dần
            </option>
            <option value="desc" th:selected="${currentSort == 'desc'}">
              Giá giảm dần
            </option>
          </select>

          <button type="submit" class="btn btn-success">Lọc</button>
        </form>
      </div>

      <table class="table table-striped table-bordered mt-3">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
              <img th:src="${product.image}" alt="Product Image" width="50" />
            </td>
            <td th:text="${product.price}"></td>
            <td
              th:text="${product.category != null ? product.category.name : ''}"
            ></td>

            <td>
              <th:block th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
                  <a
                    th:href="@{/products/edit/{id}(id=${product.id}, page=${currentPage})}"
                    class="btn btn-warning btn-sm"
                    >Edit</a
                  >

                  <a
                    th:href="@{/products/delete/{id}(id=${product.id}, page=${currentPage})}"
                    class="btn btn-danger btn-sm"
                    >Delete</a
                  >
              </th:block>

              <form
                th:action="@{/cart/add/{id}(id=${product.id})}"
                method="post"
                style="display: inline"
              >
                <button type="submit" class="btn btn-info btn-sm">
                  Add to Cart
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>

      <nav aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
          <li
            class="page-item"
            th:classappend="${!products.hasPrevious()} ? 'disabled'"
          >
            <a
              class="page-link"
              th:href="@{/products(page=${currentPage - 1}, categoryId=${currentCategory}, sort=${currentSort})}"
              >Previous</a
            >
          </li>

          <li class="page-item disabled">
            <span
              class="page-link text-dark fw-bold"
              th:text="'Trang ' + ${currentPage} + ' / ' + ${products.totalPages}"
            ></span>
          </li>

          <li
            class="page-item"
            th:classappend="${!products.hasNext()} ? 'disabled'"
          >
            <a
              class="page-link"
              th:href="@{/products(page=${currentPage + 1}, categoryId=${currentCategory}, sort=${currentSort})}"
              >Next</a
            >
          </li>
        </ul>
      </nav>
    </div>
  </body>
</html>
