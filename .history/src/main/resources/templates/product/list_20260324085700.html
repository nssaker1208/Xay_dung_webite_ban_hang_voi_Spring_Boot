<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <title>Product List</title>
  </head>
  <body>
    <div layout:fragment="content" class="container body-content">
      <a th:href="@{/products/add}" class="btn btn-primary mb-3"
        >Create New Product</a
      >

      <table class="table table-striped">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
              <img th:src="${product.image}" alt="Product Image" width="50" />
            </td>
            <td th:text="${product.price}"></td>
            <td
              th:text="${product.category != null ? product.category.name : ''}"
            ></td>

            <td>
              <a
                th:href="@{/products/edit/{id}(id=${product.id})}"
                class="btn btn-warning btn-sm"
                >Edit</a
              >
              <a
                th:href="@{/products/delete/{id}(id=${product.id})}"
                class="btn btn-danger btn-sm"
                >Delete</a
              >

              <form
                th:action="@{/cart/add/{id}(id=${product.id})}"
                method="post"
                style="display: inline"
              >
                <button type="submit" class="btn btn-info btn-sm">
                  Add to Cart
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>

      <div>
        <span th:text="${products.number + 1}"></span> /
        <span th:text="${products.totalPages}"></span>
      </div>
      <div>
        <a
          th:if="${products.hasPrevious()}"
          th:href="@{/products(page=${products.number - 1})}"
          >Previous</a
        >

        <a
          th:if="${products.hasNext()}"
          th:href="@{/products(page=${products.number + 1})}"
          >Next</a
        >
      </div>
    </div>
  </body>
</html>
