<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Sửa Sản Phẩm</title>
</head>
<body>
    <div layout:fragment="content" class="container mt-4">
        <h2>Chỉnh Sửa Sản Phẩm</h2>
        <form th:action="@{/products/edit}" th:object="${product}" method="post" style="max-width: 600px;">
            <input type="hidden" th:field="*{id}" />
            
            <div class="mb-3">
                <label class="form-label">Tên sản phẩm:</label>
                <input type="text" class="form-control" th:field="*{name}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Đường dẫn hình ảnh (URL):</label>
                <input type="text" class="form-control" th:field="*{image}" />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Giá tiền:</label>
                <input type="number" class="form-control" th:field="*{price}" required min="0"/>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Danh mục:</label>
                <select class="form-select" th:field="*{category.id}">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-warning">Cập nhật Sản Phẩm</button>
            <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</body>
</html>
